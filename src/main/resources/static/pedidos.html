<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos · Buffet ITU</title><link rel="icon" type="image/x-icon" href="itu.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="js/estilos.css">
    <style>
        select[multiple] { border-radius: 8px; }
        select[multiple] option { padding: 6px 10px; border-radius: 4px; }
        select[multiple] option:checked { background-color: var(--itu-verde); color: white; }
        .total-display {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--itu-verde-dark);
        }
        .aviso-seleccion {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar-itu">
    <a href="index.html" class="volver">← Volver al menú</a>
    <div class="titulo">📋 Pedidos</div>
</nav>

<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast toast-itu align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="container mt-4">

    <div class="card mb-4">
        <div class="card-header-itu" id="formTitulo">Nuevo pedido</div>
        <div class="card-body">
            <input type="hidden" id="pedidoId">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Cliente *</label>
                    <select class="form-select" id="cliente">
                        <option value="">— Seleccioná un cliente —</option>
                    </select>
                    <div class="invalid-feedback" id="err-cliente"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Mesero *</label>
                    <select class="form-select" id="mesero">
                        <option value="">— Seleccioná un mesero —</option>
                    </select>
                    <div class="invalid-feedback" id="err-mesero"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fecha *</label>
                    <input type="date" class="form-control" id="fecha" max="">
                    <div class="invalid-feedback" id="err-fecha"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Hora *</label>
                    <input type="time" class="form-control" id="hora">
                    <div class="invalid-feedback" id="err-hora"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Alimentos * <span class="text-muted fw-normal">(seleccioná uno o más)</span></label>
                    <select class="form-select" id="alimentos" multiple size="7"></select>
                    <div class="aviso-seleccion">💡 En Windows: mantené <kbd>Ctrl</kbd> para seleccionar varios. En Mac: <kbd>Cmd</kbd>.</div>
                    <div class="invalid-feedback d-block" id="err-alimentos"></div>
                </div>
                <div class="col-md-4 d-flex align-items-center gap-3">
                    <div>
                        <label class="form-label mb-1">Total calculado</label>
                        <div class="total-display" id="totalDisplay">$0,00</div>
                        <input type="hidden" id="total" value="0">
                    </div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-itu" onclick="guardarPedido()">Guardar pedido</button>
                <button class="btn btn-cancelar" onclick="limpiarFormulario()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header-itu">Listado de pedidos</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Cliente</th>
                            <th>Mesero</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Alimentos</th>
                            <th>Total</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaPedidos">
                        <tr><td colspan="8" class="text-center text-muted py-3">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer>Buffet ITU · Sistema de Gestión · Instituto Tecnológico Universitario · UNCUYO</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/pedidos.js"></script>
</body>
</html>
