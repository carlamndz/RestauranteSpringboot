<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentos · Buffet ITU</title><link rel="icon" type="image/x-icon" href="itu.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="js/estilos.css">
</head>
<body>

<nav class="navbar-itu">
    <a href="index.html" class="volver">← Volver al menú</a>
    <div class="titulo">🍔 Alimentos</div>
</nav>

<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast toast-itu align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="container mt-4">

    <div class="card mb-4">
        <div class="card-header-itu" id="formTitulo">Nuevo alimento</div>
        <div class="card-body">
            <input type="hidden" id="alimentoId">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Nombre *</label>
                    <input type="text" class="form-control" id="nombre" maxlength="120" placeholder="Nombre del plato o bebida">
                    <div class="invalid-feedback" id="err-nombre"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Precio *</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" id="precio" min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div class="invalid-feedback d-block" id="err-precio"></div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-itu" onclick="guardarAlimento()">Guardar</button>
                <button class="btn btn-cancelar" onclick="limpiarFormulario()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header-itu">Listado de alimentos</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAlimentos">
                        <tr><td colspan="4" class="text-center text-muted py-3">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer>Buffet ITU · Sistema de Gestión · Instituto Tecnológico Universitario · UNCUYO</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/alimentos.js"></script>
</body>
</html>
