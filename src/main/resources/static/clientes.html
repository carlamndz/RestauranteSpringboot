<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes · Buffet ITU</title> <link rel="icon" type="image/x-icon" href="itu.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="js/estilos.css">
</head>
<body>

<nav class="navbar-itu">
    <a href="index.html" class="volver">← Volver al menú</a>
    <div class="titulo">👥 Clientes</div>
</nav>

<!-- Toast notificaciones -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast toast-itu align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMsg">Operación exitosa</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="container mt-4">

    <!-- Formulario -->
    <div class="card mb-4">
        <div class="card-header-itu" id="formTitulo">Nuevo cliente</div>
        <div class="card-body">
            <input type="hidden" id="clienteId">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" class="form-control" id="nombre" maxlength="80" placeholder="Solo letras">
                    <div class="invalid-feedback" id="err-nombre"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido *</label>
                    <input type="text" class="form-control" id="apellido" maxlength="80" placeholder="Solo letras">
                    <div class="invalid-feedback" id="err-apellido"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">DNI</label>
                    <input type="text" class="form-control" id="cedula" maxlength="15" placeholder="Solo números">
                    <div class="invalid-feedback" id="err-cedula"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono</label>
                    <input type="text" class="form-control" id="telefono" maxlength="15" placeholder="Solo números">
                    <div class="invalid-feedback" id="err-telefono"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control" id="correo" maxlength="80" placeholder="ejemplo@mail.com">
                    <div class="invalid-feedback" id="err-correo"></div>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-itu" onclick="guardarCliente()">Guardar</button>
                <button class="btn btn-cancelar" onclick="limpiarFormulario()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card">
        <div class="card-header-itu">Listado de clientes</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaClientes">
                        <tr><td colspan="7" class="text-center text-muted py-3">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer>Buffet ITU · Sistema de Gestión · Instituto Tecnológico Universitario · UNCUYO</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/clientes.js"></script>
</body>
</html>
